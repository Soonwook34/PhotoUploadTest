<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F2FCFB">
    <title>순욱 ♥ 소희 결혼합니다</title>
    <meta property="og:type" content="website">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/icons/favicon/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/invitation.css">
</head>
<body>

    <div id="loading" class="loading">
        <div class="loading__sky">
            <svg class="loading__plane" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M7 0L6 2V5L0 9V11H1L6 10L7 13L5 14V16H11V14L9 13L10 10L15 11H16V9L10 5V2L9 0H7Z" fill="currentColor"/>
            </svg>
        </div>
        <p class="loading__text">티켓 발권중...</p>
    </div>

    <div class="invitation">

        <div class="rail" data-bind="rail-top"></div>

        <section class="section hero">
            <p class="section-label" data-bind-label="heroLabel"></p>
            <div class="couple">
                <div class="couple-side">
                    <h1 class="couple-name" data-bind="groom-name">&nbsp;</h1>
                    <p class="couple-sub" data-bind="groom-sub"></p>
                </div>
                <span class="couple-heart icon-inline icon-mint" data-icon="heart" aria-hidden="true" style="width:36px;height:36px;"></span>
                <div class="couple-side">
                    <h1 class="couple-name" data-bind="bride-name">&nbsp;</h1>
                    <p class="couple-sub" data-bind="bride-sub"></p>
                </div>
            </div>
            <p class="hero-date" data-bind="hero-date-mono"></p>
            <div class="hero-image placeholder" data-bind="hero-image">
                <span>사진을 준비 중입니다</span>
            </div>
            <div class="flipboard" data-section="countdown" data-bind="countdown"></div>
        </section>

        <div class="perforation"></div>

        <section class="section greeting mint-panel">
            <p class="section-label" data-bind-label="greetingLabel"></p>
            <h2 class="headline-en">
                <span data-bind-label="greetingHeadline"></span>
            </h2>
            <span class="icon-inline icon-ink headline-icon" data-icon="flight-takeoff" style="width:40px;height:40px;"></span>
            <p class="greeting-text" data-bind="greeting-body"></p>
            <div class="parents-grid">
                <p class="parents-line" data-bind="groom-parents"></p>
                <p class="parents-line" data-bind="bride-parents"></p>
            </div>
        </section>

        <div class="perforation"></div>

        <section class="section info">
            <p class="section-label" data-bind-label="eventDetailsLabel"></p>
            <div class="kv-grid">
                <div>
                    <p class="kv-label">날짜</p>
                    <p class="kv-value" data-bind="info-date-mono"></p>
                </div>
                <div>
                    <p class="kv-label">시간</p>
                    <p class="kv-value" data-bind="info-time-mono"></p>
                </div>
            </div>
            <div class="divider"></div>
            <p class="kv-label">장소</p>
            <p class="venue-name" data-bind="info-venue"></p>
            <p class="venue-address" data-bind="info-address"></p>
            <div class="calendar-widget" data-bind="calendar"></div>
        </section>

        <div class="perforation"></div>

        <section class="section gallery-section" data-section="gallery">
            <p class="section-label" data-bind-label="storyLabel"></p>
            <div class="gallery-grid" data-bind="gallery"></div>
        </section>

        <div class="perforation"></div>

        <section class="section location">
            <p class="section-label" data-bind-label="directionsLabel"></p>
            <div class="transport-list" data-bind="transport-list"></div>
            <div class="map-apps" data-section="map-apps" data-bind="map-apps"></div>
        </section>

        <div class="perforation"></div>

        <section class="section contacts-section">
            <p class="section-label" data-bind-label="contactsLabel"></p>
            <div class="contacts" data-bind="contacts"></div>
        </section>

        <div class="perforation"></div>

        <section class="section photo-link">
            <p class="section-label" data-bind-label="uploadLabel"></p>
            <p class="photo-sub" data-bind-label="uploadSub"></p>
            <span class="icon-inline cta-icon-above" data-icon="plane" style="width:40px;height:40px;color:var(--color-mint);"></span>
            <a data-bind="upload-link" href="upload/" class="btn-mono mint">
                <span data-bind-label="uploadCta"></span>
            </a>
        </section>

        <div class="perforation"></div>

        <section class="section account" data-section="accounts">
            <p class="section-label" data-bind-label="accountsLabel"></p>
            <p class="account-sub" data-bind-label="accountsSub"></p>
            <div class="accounts" data-bind="accounts"></div>
        </section>

        <div class="perforation"></div>

        <section class="section share-section mint-panel">
            <p class="section-label" data-bind-label="shareLabel"></p>
            <h2 class="headline-en">
                <span data-bind-label="shareHeadline"></span>
            </h2>
            <span class="icon-inline icon-ink headline-icon" data-icon="stamp" style="width:40px;height:40px;"></span>
            <div class="share-buttons">
                <button type="button" class="btn-mono outline" data-bind="share-calendar" data-bind-label="shareCalendarCta"></button>
                <button type="button" class="btn-mono outline" data-bind="share-link" data-bind-label="shareLinkCta"></button>
                <button type="button" class="btn-mono outline" data-bind="share-kakao" data-bind-label="shareKakaoCta" style="display:none;"></button>
            </div>
        </section>

        <div class="perforation"></div>

        <section class="section flower-section">
            <p class="section-label" data-bind-label="flowerLabel"></p>
            <p class="flower-notice" data-bind-label="flowerNotice"></p>
        </section>

        <div class="perforation"></div>

        <footer>
            <p class="section-label" data-bind-label="thankYouLabel"></p>
            <span class="icon-inline" data-icon="flight-takeoff" style="width:40px;height:40px;color:var(--color-mint);margin-top:12px;display:inline-block;"></span>
            <p class="footer-text" data-bind-label="thankYouText"></p>
        </footer>

        <div class="rail" data-bind="rail-bottom"></div>

    </div>

    <div id="lightbox" class="lightbox" hidden>
        <button id="lightbox-close" class="lightbox-close">&times;</button>
        <div id="lightbox-counter" class="lightbox-counter"></div>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev-btn">&lsaquo;</button>
        <button id="lightbox-next" class="lightbox-nav lightbox-next-btn">&rsaquo;</button>
        <div id="lightbox-content" class="lightbox-content"></div>
        <div id="lightbox-info" class="lightbox-info"></div>
    </div>

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>
    <script type="module" src="js/invitation.js"></script>
</body>
</html>
